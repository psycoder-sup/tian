# tian worktree config
# Applied by WorktreeOrchestrator when a new worktree Space is created.
# Schema: tian/Worktree/WorktreeConfig.swift

worktree_dir = "~/.worktrees"

# Symlink Ghostty build artifacts from the main worktree so new worktrees
# skip the multi-minute `scripts/build-ghostty.sh` rebuild. Both paths are
# gitignored, so `git worktree add` doesn't copy them into the new worktree.
[[setup]]
command = "MAIN=$(dirname \"$(git rev-parse --path-format=absolute --git-common-dir)\") && ln -sfn \"$MAIN/.ghostty-src\" .ghostty-src && ln -sfn \"$MAIN/tian/Vendor\" tian/Vendor"
