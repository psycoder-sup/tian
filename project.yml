name: aterm
options:
  bundleIdPrefix: com.aterm
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.3"
  minimumXcodeGenVersion: "2.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "26.0"

schemes:
  aterm:
    build:
      targets:
        aterm: all
        atermTests: [test]
        atermUITests: [test]
    test:
      targets:
        - atermTests
        - atermUITests

targets:
  aterm:
    type: application
    platform: macOS
    sources:
      - path: aterm
        excludes:
          - "Vendor/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aterm.app
        PRODUCT_NAME: aterm
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: aterm
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_UTExportedTypeDeclarations: |
          (
            {
              UTTypeIdentifier = "com.aterm.tab-drag-item";
              UTTypeConformsTo = ("public.data");
              UTTypeDescription = "aterm Tab";
              UTTypeTagSpecification = {};
            },
            {
              UTTypeIdentifier = "com.aterm.space-drag-item";
              UTTypeConformsTo = ("public.data");
              UTTypeDescription = "aterm Space";
              UTTypeTagSpecification = {};
            },
            {
              UTTypeIdentifier = "com.aterm.workspace-drag-item";
              UTTypeConformsTo = ("public.data");
              UTTypeDescription = "aterm Workspace";
              UTTypeTagSpecification = {};
            }
          )
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: aterm/aterm.entitlements
        ENABLE_APP_SANDBOX: false
        SWIFT_OBJC_BRIDGING_HEADER: aterm/aterm-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/aterm/Vendor/GhosttyKit.xcframework/macos-arm64/Headers
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/aterm/Vendor/GhosttyKit.xcframework/macos-arm64
        OTHER_LDFLAGS:
          - -lghostty-fat
          - -lc
          - -lc++
          - -framework Carbon

  atermTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: atermTests
    dependencies:
      - target: aterm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aterm.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/aterm.app/Contents/MacOS/aterm
        BUNDLE_LOADER: $(TEST_HOST)
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/aterm/Vendor/GhosttyKit.xcframework/macos-arm64/Headers

  atermUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: atermUITests
    dependencies:
      - target: aterm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aterm.uitests
        GENERATE_INFOPLIST_FILE: true
