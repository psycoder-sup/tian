name: tian
options:
  bundleIdPrefix: com.tian
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.3"
  minimumXcodeGenVersion: "2.0"

packages:
  swift-argument-parser:
    url: https://github.com/apple/swift-argument-parser
    from: "1.5.0"
  TOMLKit:
    url: https://github.com/LebJe/TOMLKit
    from: "0.6.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ARCHS: arm64

schemes:
  tian:
    build:
      targets:
        tian: all
        tian-cli: all
        tianTests: [test]
        tianUITests: [test]
    test:
      targets:
        - tianTests
        - tianUITests

targets:
  tian:
    type: application
    platform: macOS
    sources:
      - path: tian
        excludes:
          - "Vendor/**"
          - "Resources/claude"
          - "Resources/tian-hook-log.sh"
          - "Resources/tian-claude-settings.json"
          - "Resources/shell-integration/**"
    dependencies:
      - target: tian-cli
      - package: TOMLKit
        product: TOMLKit
    postCompileScripts:
      - script: cp -f "$BUILT_PRODUCTS_DIR/tian-cli" "$BUILT_PRODUCTS_DIR/${PRODUCT_NAME}.app/Contents/MacOS/tian-cli"
        name: Bundle tian-cli
        inputFiles:
          - $(BUILT_PRODUCTS_DIR)/tian-cli
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/Contents/MacOS/tian-cli
      - script: |
          SHARE="$SRCROOT/.ghostty-src/zig-out/share"
          RESOURCES="$BUILT_PRODUCTS_DIR/${PRODUCT_NAME}.app/Contents/Resources"
          rsync -a --delete "$SHARE/ghostty/" "$RESOURCES/ghostty/"
          rsync -a --delete "$SHARE/terminfo/" "$RESOURCES/terminfo/"
        name: Bundle Ghostty Resources
        inputFiles:
          - $(SRCROOT)/.ghostty-src/zig-out/share/ghostty/
          - $(SRCROOT)/.ghostty-src/zig-out/share/terminfo/
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/Contents/Resources/ghostty/
          - $(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/Contents/Resources/terminfo/
      - script: |
          cp -f "$SRCROOT/tian/Resources/claude" "$BUILT_PRODUCTS_DIR/${PRODUCT_NAME}.app/Contents/Resources/claude"
          chmod +x "$BUILT_PRODUCTS_DIR/${PRODUCT_NAME}.app/Contents/Resources/claude"
        name: Bundle Claude Wrapper
        inputFiles:
          - $(SRCROOT)/tian/Resources/claude
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/Contents/Resources/claude
      - script: cp -f "$SRCROOT/tian/Resources/tian-claude-settings.json" "$BUILT_PRODUCTS_DIR/${PRODUCT_NAME}.app/Contents/Resources/tian-claude-settings.json"
        name: Bundle Claude Settings
        inputFiles:
          - $(SRCROOT)/tian/Resources/tian-claude-settings.json
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/Contents/Resources/tian-claude-settings.json
      - script: |
          cp -f "$SRCROOT/tian/Resources/tian-hook-log.sh" "$BUILT_PRODUCTS_DIR/${PRODUCT_NAME}.app/Contents/Resources/tian-hook-log.sh"
          chmod +x "$BUILT_PRODUCTS_DIR/${PRODUCT_NAME}.app/Contents/Resources/tian-hook-log.sh"
        name: Bundle Claude Hook Logger
        inputFiles:
          - $(SRCROOT)/tian/Resources/tian-hook-log.sh
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/Contents/Resources/tian-hook-log.sh
      - script: |
          SI_SRC="$SRCROOT/tian/Resources/shell-integration"
          SI_DST="$BUILT_PRODUCTS_DIR/${PRODUCT_NAME}.app/Contents/Resources/shell-integration"
          mkdir -p "$SI_DST/zsh"
          # Copy zsh dotfiles (renamed from non-dot source to dotfile in bundle)
          for f in zshenv zprofile zshrc zlogin; do
            cp -f "$SI_SRC/zsh/$f" "$SI_DST/zsh/.$f"
          done
          # Copy integration scripts
          cp -f "$SI_SRC/tian-zsh-integration.zsh" "$SI_DST/tian-zsh-integration.zsh"
          cp -f "$SI_SRC/tian-bash-integration.bash" "$SI_DST/tian-bash-integration.bash"
        name: Bundle Shell Integration
        inputFiles:
          - $(SRCROOT)/tian/Resources/shell-integration/zsh/zshenv
          - $(SRCROOT)/tian/Resources/shell-integration/zsh/zprofile
          - $(SRCROOT)/tian/Resources/shell-integration/zsh/zshrc
          - $(SRCROOT)/tian/Resources/shell-integration/zsh/zlogin
          - $(SRCROOT)/tian/Resources/shell-integration/tian-zsh-integration.zsh
          - $(SRCROOT)/tian/Resources/shell-integration/tian-bash-integration.bash
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/Contents/Resources/shell-integration/zsh/.zshenv
          - $(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/Contents/Resources/shell-integration/tian-zsh-integration.zsh
          - $(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/Contents/Resources/shell-integration/tian-bash-integration.bash
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tian.app
        PRODUCT_NAME: tian
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: tian
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_UTExportedTypeDeclarations: |
          (
            {
              UTTypeIdentifier = "com.tian.tab-drag-item";
              UTTypeConformsTo = ("public.data");
              UTTypeDescription = "tian Tab";
              UTTypeTagSpecification = {};
            },
            {
              UTTypeIdentifier = "com.tian.space-drag-item";
              UTTypeConformsTo = ("public.data");
              UTTypeDescription = "tian Space";
              UTTypeTagSpecification = {};
            },
            {
              UTTypeIdentifier = "com.tian.workspace-drag-item";
              UTTypeConformsTo = ("public.data");
              UTTypeDescription = "tian Workspace";
              UTTypeTagSpecification = {};
            }
          )
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: tian/tian.entitlements
        ENABLE_APP_SANDBOX: false
        SWIFT_OBJC_BRIDGING_HEADER: tian/tian-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/tian/Vendor/GhosttyKit.xcframework/macos-arm64/Headers
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/tian/Vendor/GhosttyKit.xcframework/macos-arm64
        OTHER_LDFLAGS:
          - -lghostty-fat
          - -lc
          - -lc++
          - -framework Carbon
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.tian.app.debug
          PRODUCT_NAME: tian-debug
          PRODUCT_MODULE_NAME: tian
          INFOPLIST_KEY_CFBundleName: Tian (debug)
          INFOPLIST_KEY_CFBundleDisplayName: Tian (debug)

  tianTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: tianTests
      - path: tian-cli/CommandLogger.swift
      - path: tian-cli/AutoSetPrompt.swift
      - path: tian-cli/AutoSetPayload.swift
      - path: tian-cli/ClaudeInvoker.swift
      - path: tian-cli/ConfigAutoSetRunner.swift
      - path: tian-cli/CLIError.swift
    dependencies:
      - target: tian
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tian.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/tian.app/Contents/MacOS/tian
        BUNDLE_LOADER: $(TEST_HOST)
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/tian/Vendor/GhosttyKit.xcframework/macos-arm64/Headers
      configs:
        Debug:
          TEST_HOST: $(BUILT_PRODUCTS_DIR)/tian-debug.app/Contents/MacOS/tian-debug

  tian-cli:
    type: tool
    platform: macOS
    sources:
      - path: tian-cli
    dependencies:
      - package: swift-argument-parser
        product: ArgumentParser
      - package: TOMLKit
        product: TOMLKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tian.cli
        PRODUCT_NAME: tian-cli

  tianUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: tianUITests
    dependencies:
      - target: tian
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tian.uitests
        GENERATE_INFOPLIST_FILE: true
